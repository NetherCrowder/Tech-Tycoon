<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Level 1 Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: radial-gradient(circle at center, rgba(0,212,255,.08) 0%, #050a14 100%);
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Grid layout background just for the map */
    body::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.05) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: -1;
    }

    .mapa-header {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      right: 1.5rem;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      z-index: 10;
    }

    .mapa-badge {
      background: rgba(13,26,46,.8);
      border: 1px solid rgba(0,212,255,.3);
      padding: .4rem .8rem;
      border-radius: 6px;
      font-size: .75rem;
      font-family: 'Orbitron', monospace;
      color: #94a3b8;
      backdrop-filter: blur(4px);
    }

    .mapa-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Elementos del mapa (Simulados) */
    .base-core {
      width: 140px; height: 140px;
      background: rgba(0,212,255,.05);
      border: 2px solid #00d4ff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(0,212,255,.3), inset 0 0 20px rgba(0,212,255,.3);
      animation: corePulse 3s infinite alternate;
    }
    @keyframes corePulse {
      from { box-shadow: 0 0 30px rgba(0,212,255,.2); }
      to { box-shadow: 0 0 60px rgba(0,212,255,.5), inset 0 0 30px rgba(0,212,255,.5); }
    }
    
    .base-core span {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 2.2rem;
      color: #00d4ff;
      opacity: .9;
      text-shadow: 0 0 10px #00d4ff;
    }

    /* Orbiting paths / Enemy path ring */
    .map-ring {
      position: absolute;
      border: 1px dashed rgba(239,68,68,.3);
      border-radius: 50%;
      pointer-events: none;
    }
    .ring-1 { width: 350px; height: 350px; border-color: rgba(0,212,255,.2); animation: spin 40s linear infinite; }
    .ring-2 { width: 500px; height: 500px; animation: spinRev 60s linear infinite; }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spinRev { 100% { transform: rotate(-360deg); } }

    /* Pulsador T-1 Model */
    .pulsador-t1 {
      position: absolute;
      width: 20px; height: 20px;
      background: var(--surface, #0d1a2e);
      border: 2px solid #22c55e;
      border-radius: 4px;
      margin-top: -10px; margin-left: -10px;
      box-shadow: 0 0 10px #22c55e;
      z-index: 20;
      transition: transform 0.1s linear;
    }
    
    .pulsador-t1::after {
        content: ''; position: absolute; inset: -4px; border-radius: 50%;
        border: 1px solid rgba(34,197,94,0.3);
        animation: radarPulse 1.5s infinite; /* Simulates attack speed */
    }

    @keyframes radarPulse {
        0% { transform: scale(1); opacity: 1; border-color: rgba(34,197,94,1); }
        100% { transform: scale(4); opacity: 0; border-color: rgba(34,197,94,0); }
    }

    /* Node on ring (Enemies) */
    .enemy-node {
      position: absolute; width: 14px; height: 14px;
      margin-top: -7px; margin-left: -7px;
      background: #ef4444; border-radius: 50%;
      box-shadow: 0 0 15px #ef4444;
      transition: transform 0.1s linear, opacity 0.1s linear;
    }
  </style>
</head>
<body>

  <div class="mapa-header">
    <div class="mapa-badge">Mundo Virtual: Nivel 1</div>
  </div>

  <div class="mapa-area">
    <!-- Decoración geométrica -->
    <div class="map-ring ring-1"></div>
    <div class="map-ring ring-2"></div>
    
    <!-- Contenedor dinámico central absoluto -->
    <div id="defenses-container" style="position: absolute; top:50%; left:50%; width:0; height:0; z-index:100; overflow:visible;"></div>
    
    <!-- El núcleo a defender -->
    <div class="base-core">
      <span>CORE</span>
    </div>
  </div>

  <script>
    const container = document.getElementById('defenses-container');

    async function updateMap() {
        try {
            const res = await fetch('/api/game/map');
            if(res.ok) {
                const data = await res.json();
                
                // 1. DIBUJO PERSISTENTE DE DEFENSAS
                let currentDefIds = new Set();
                data.defenses.forEach((def) => {
                    currentDefIds.add(def.uuid);
                    let rot = def.angle;
                    
                    let el = document.getElementById(def.uuid);
                    if(!el) {
                        el = document.createElement('div');
                        el.id = def.uuid;
                        el.className = 'pulsador-t1';
                        
                        let hpTooltip = document.createElement('div');
                        hpTooltip.id = def.uuid + '-hp';
                        hpTooltip.style.fontSize = '8px'; hpTooltip.style.color = '#22c55e';
                        hpTooltip.style.position = 'absolute'; hpTooltip.style.bottom = '-14px'; hpTooltip.style.left = '-2px';
                        el.appendChild(hpTooltip);
                        
                        container.appendChild(el);
                    }
                    el.style.transform = `rotate(${rot}deg) translateX(175px) rotate(-${rot}deg)`;
                    
                    // Show health if damaged!
                    let hpLabel = document.getElementById(def.uuid + '-hp');
                    if(def.health < def.max_health) {
                        hpLabel.innerText = Math.round(def.health);
                        el.style.borderColor = def.health < (def.max_health * 0.3) ? '#ef4444' : '#eab308';
                    } else {
                        hpLabel.innerText = '';
                        el.style.borderColor = '#22c55e';
                    }
                });
                
                Array.from(container.getElementsByClassName('pulsador-t1')).forEach(el => {
                    if(!currentDefIds.has(el.id)) el.remove();
                });
                
                // 2. DIBUJO DELTA DE ENEMIGOS C/ INTERPOLACIÓN GPU (Ghosnets)
                let currentEnemyIds = new Set();
                data.enemies.forEach((enemy) => {
                   currentEnemyIds.add(enemy.uuid);
                   let radius = enemy.distance * 2.5; 
                   let hp_pct = Math.max(0, enemy.health / enemy.max_health);
                   
                   let el = document.getElementById(enemy.uuid);
                   if(!el) {
                       el = document.createElement('div');
                       el.id = enemy.uuid;
                       el.className = 'enemy-node';
                       let tooltip = document.createElement('div');
                       tooltip.id = enemy.uuid + '-hp';
                       tooltip.style.fontSize = '8px'; tooltip.style.color = 'white';
                       tooltip.style.position = 'absolute'; tooltip.style.top = '-12px'; tooltip.style.left = '-5px';
                       el.appendChild(tooltip);
                       container.appendChild(el);
                   }
                   
                   el.style.transform = `rotate(${enemy.angle}deg) translateX(${radius}px) rotate(-${enemy.angle}deg)`;
                   el.style.opacity = (0.5 + (0.5 * hp_pct)).toFixed(2);
                   document.getElementById(enemy.uuid + '-hp').innerText = Math.round(enemy.health);
                });
                
                Array.from(container.getElementsByClassName('enemy-node')).forEach(el => {
                    if(!currentEnemyIds.has(el.id)) el.remove();
                });
            }
        } catch(e) {}
    }

    updateMap();
    // Bajar requests a 10FPS (100ms). El navegador interpola el movimiento mediante CSS transition a la velocidad nativa del monitor.
    setInterval(updateMap, 100);
  </script>
</body>
</html>
